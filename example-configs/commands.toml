# Ensure not to use double quartation.
# pattern and escape requires escapement

# Math---------------------------------------
[frac]
## escapement(for Regex) required
pattern = 'frac'
type = 'Template'
template = '\frac{$0}{$1}'
args_count = 2
## escapement(for Regex) required
alias = ["f"]

[mat]
pattern = 'mat'
type = 'Environment'
env_name = 'bmatrix'
alias = ['m']
row_separator = '\\'
col_separator = '&'
[vmat]
pattern = '\|mat\|'
type = "Environment"
env_name = "vmatrix"
alias = ['\|m\|']
row_separator = '\\'
col_separator = '&'
[tmat]
pattern = 'mat\^t'
type = 'Environment'
env_name = 'bmatrix'
alias = ['m\^t']
row_separator = '\\'
col_separator = '&'
output_suffix = '^{\top}'

[lim]
pattern = 'lim'
type = 'Template'
template = '\lim_{$0 \to $1} $2'
args_count = 2

[integral]
pattern = 'int'
type = 'Template'
template = '\int_{$0}^{$1} $2 \, d$3'
args_count = 4
alias = ['integral']

[sum]
pattern = 'sum'
type = 'Template'
template = '\sum_{$0}^{$1} $2'
args_count = 3

[prod]
pattern = 'prod'
type = 'Template'
template = '\prod_{$0}^{$1} $2'
args_count = 3

[sqrt]
pattern = 'sqrt'
type = 'Template'
template = '\sqrt{$0}'
args_count = 1

[nsqrt]
pattern = 'nsqrt'
type = 'Template'
template = '\sqrt[$0]{$1}'
args_count = 2

[abs]
pattern = 'abs'
type = 'Template'
template = '\left|$0\right|'
args_count = 1

[norm]
pattern = 'norm'
type = 'Template'
template = '\left\|$0\right\|'
args_count = 1

[ceil]
pattern = 'ceil'
type = 'Template'
template = '\left\lceil$0\right\rceil'
args_count = 1

[floor]
pattern = 'floor'
type = 'Template'
template = '\left\lfloor$0\right\rfloor'
args_count = 1

# Document
[h1]
pattern = '^# (.+)$'
type = "Regex"
template = '\section{$1}'

[h2]
pattern = '^## (.+)$'
type = "Regex"
template = '\subsection{$1}'

[h3]
pattern = '^### (.+)$'
type = "Regex"
template = '\subsubsection{$1}'

[itemize]
pattern = "itemize"
type = "Environment"
env_name = "itemize"
row_separator = '\item '

# Structure
[inline_math]
pattern = '\$'
type = "Wrap"
prefix = '$'
suffix = '$'

[display_math]
pattern = '\$\$'
type = "Wrap"
prefix = '\begin{align*}'
suffix = '\end{align*}'

# join vertical elem in horizontal direction.
[flatten]
pattern = '\|\|'
type = "Wrap"
prefix = ''
suffix = ''

