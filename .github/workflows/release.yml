name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: x86_64-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: x86_64-macos
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: aarch64-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: x86_64-windows
            ext: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Check version matches tag
        shell: bash
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: Cargo.toml=$CARGO_VERSION, tag=$TAG_VERSION"
            exit 1
          fi

      - name: Build cli
        run: cargo build --release -p cli --target ${{ matrix.target }}

      - name: Build lsp
        run: cargo build --release -p lsp --target ${{ matrix.target }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/cli${{ matrix.ext }}
            target/${{ matrix.target }}/release/lsp${{ matrix.ext }}
